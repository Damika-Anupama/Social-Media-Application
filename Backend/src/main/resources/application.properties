# App Properties
#
# NOTE: All secrets in this file have been redacted before publishing to a
# public repository. Replace each REDACTED-* placeholder with a value from a
# secret store (environment variable, vault, etc.) before running locally.

app.log_dir=/var/log
#logging.file.name=my.log
jwt.secret=REDACTED-jwt-signing-secret
jwt.expirationDateInMs=36000000

# Max file size.
spring.servlet.multipart.max-file-size=100MB
# Max request size.
spring.servlet.multipart.max-request-size=100MB

media-upload.path=/path/to/upload/folder

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update

spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.url=jdbc:mysql://localhost:3306/palindrome?createDatabaseIfNotExist=true
spring.datasource.hikari.username=REDACTED-db-username
spring.datasource.hikari.password=REDACTED-db-password
spring.datasource.hikari.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.idleTimeout=600000
spring.datasource.hikari.maxLifetime=1800000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=REDACTED-smtp-username
spring.mail.password=REDACTED-smtp-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

com.palindrome.twilio.AUTH.TOKEN=REDACTED-twilio-auth-token
com.palindrome.twilio.Account.SID=REDACTED-twilio-account-sid
#spring.jpa.open-in-view=false
# OSIV (Open Session in View) is disabled in application properties using the following configuration. The developer should take care of the database connection and lazy fetch association in service layer.
#spring.jpa.open-in-view=true
# OSIV has been enabled by default. It can be enabled in application properties using the configuration below. If OSIV is enabled, database performance should be tested and taken care in production environment.
